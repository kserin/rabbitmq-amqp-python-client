[isort]
multi_line_output = 3
line_length = 60
include_trailing_comma = True
skip = venv


[flake8]
exclude = .git, venv
max-line-length = 120

[mypy]
python_version = 3.10
strict = True
ignore_missing_imports = True
exclude = ^rabbitmq_amqp_python_client/qpid/

[mypy-rabbitmq_amqp_python_client.qpid.*]
ignore_errors = True


[mypy-tests.*]
ignore_errors = True
ignore_missing_imports = True
